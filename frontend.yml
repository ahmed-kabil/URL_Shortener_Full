apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-dep
  labels:
    app: frontend-dep
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: frontend
  template:
    metadata:
      name: frontend-pod
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-con
        image: url-shortener-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: BACK_HOST
          valueFrom:
            configMapKeyRef:
              name: config-map
              key: BACK_HOST
        - name: BACK_PORT
          value: "7000"
---
apiVersion: v1
kind: Service
metadata: 
  name: frontend-srv
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80