apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: url-shortener
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/ahmed-kabil/URL_Shortener_Full.git"
    path: k8s
    targetRevision: main
  destination:
    server: "https://kubernetes.default.svc"
    namespace: url-short
  syncPolicy:
    automated:
      selfHeal: true
      prune: true