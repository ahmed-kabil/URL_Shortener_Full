apiVersion: v1
kind: PersistentVolume
metadata:
  name: url-pv
spec:
  capacity:
    storage: 500Mi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-manual
  persistentVolumeReclaimPolicy: Retain
  local:
    path: "/mnt/data"
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - ecs-a7ed   # 👈 replace with your node name