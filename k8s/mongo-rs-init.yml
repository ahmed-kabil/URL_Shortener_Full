apiVersion: batch/v1
kind: Job
metadata:
  name: init-job
  namespace: url-short
  annotations:
    # argocd.argoproj.io/sync-wave: "1"
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: init-job
        image: mongo:6.0
        command:
        - mongosh
        - --host
        - url-mongodb-sfs-0.url-mongodb-headless-srv
        - --eval
        - |
          try {
            rs.status()
            print("Replica set already initialized")
          } catch (e) {
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "url-mongodb-sfs-0.url-mongodb-headless-srv:27017", priority: 2 },
                { _id: 1, host: "url-mongodb-sfs-1.url-mongodb-headless-srv:27017" },
                { _id: 2, host: "url-mongodb-sfs-2.url-mongodb-headless-srv:27017" }
              ]
            })
          }