apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-frontend-dep
  namespace: url-short
  labels:
    app: url-frontend
    project: url-shortener
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: url-frontend
  template:
    metadata:
      name: url-frontend-pod
      labels:
        app: url-frontend
        project: url-shortener
    spec:
      containers:
      - name: url-frontend-con
        image: ahmedkabil/url-frontend:1.43
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: BACK_HOST
          valueFrom:
            configMapKeyRef:
              name: url-config-map
              key: BACK_HOST
        - name: BACK_PORT
          value: "7000"
          
---
apiVersion: v1
kind: Service
metadata: 
  name: url-frontend-srv
  namespace: url-short
  labels:
    project: url-shortener
spec:
  selector:
    app: url-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80